<div class="row">
  <div class="col-6 m-auto">
  <div class="card m-auto">
    <div class="card-header">
      Register
    </div>
    <div class="card-body">
      <form [formGroup]="registrationForm"(ngSubmit)="onSubmit()">
        <div class="form-group col-12">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="username"
            formControlName="username">
            <span *ngIf="!username.valid && (username.touched||userSubmited)" class="error-block">
              please provide name
            </span>
        </div>

        <div class="form-group col-12">
          <label for="email" class="form-label">Email</label>
          <input type="text" class="form-control" formControlName="email">
          <span *ngIf="!email.valid
            && (email.touched||userSubmited)" class="error-block">
            <span *ngIf="email.hasError('required')">
              please provide email
            </span>
             <span *ngIf="email.hasError('email')">
              please provide valid email id
            </span>
          </span>
        </div>

        <div class="form-group col-12">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" formControlName="password">
           <span *ngIf="!password.valid
            && (password.touched||userSubmited)" class="error-block">
            <span *ngIf="password?.errors?.['required']">
              please provide password
            </span>
             <span *ngIf="password?.errors?.['minlength']">
              password should not be lesser than 8 characters
            </span>
          </span>
        </div>

        <div class="form-group col-12">
          <label for="cpassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" formControlName="confirmpassword">
         <span *ngIf="registrationForm?.errors?.['notmatched'] && (confirmpassword?.dirty||userSubmited)"
          class="error-block">
            Password not matched
          </span>
        </div>

        <div class="form-group col-12">
          <label for="mobile" class="form-label">Mobile</label>
          <input type="text" class="form-control" formControlName="mobile">
          <span *ngIf="!mobile.valid
            && (mobile.touched||userSubmited)" class="error-block">
            <span *ngIf="mobile.hasError('required')">
              please provide mobile number
            </span>
             <span *ngIf="mobile.hasError('mobile')">
              please provide valid mobile number
            </span>
          </span>
        </div>

        <div class="form-group col-12">
          <button type="submit" class="btn btn-primary">Save</button>
          <button type="reset" class="btn btn-secondary ml-2">Cancel</button>
        </div>
      </form>
    </div>
  </div>
  </div>
</div>
